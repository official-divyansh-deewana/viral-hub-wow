<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Hub - Premium Video Stream</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="nav-left">
                <button class="back-btn" id="backBtn" onclick="showGridView()">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <a href="#" class="logo" onclick="showGridView(); resetFilters();">
                    <i class="fa-solid fa-play"></i>
                    <span>Viral Hub</span>
                </a>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search viral videos..." onkeyup="filterVideos()">
            </div>
            <div class="nav-right">
                <button class="tab-btn active" id="tabAll" onclick="switchTab('all')">
                    <i class="fa-solid fa-compass"></i><span>Explore</span>
                </button>
                <button class="tab-btn" id="tabFav" onclick="switchTab('favorites')">
                    <i class="fa-solid fa-heart"></i><span>Favorites</span>
                </button>
                <button class="tab-btn" id="tabHist" onclick="switchTab('history')">
                    <i class="fa-solid fa-clock-rotate-left"></i><span>History</span>
                </button>
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </header>
    <main>
        <section id="gridView" class="view-section active-view">
            <div class="grid-header">
                <h2 id="sectionTitle">Latest Videos</h2>
            </div>
            <div class="video-grid" id="videoGrid"></div>
        </section>
        <section id="playerView" class="view-section player-view">
            <div class="player-container" id="playerContainer">
                <video class="video-element" id="mainVideo" preload="metadata" playsinline></video>
                <div class="play-animation-overlay" id="playOverlay">
                    <i class="fa-solid fa-play" style="color: #fff; font-size: 2.5rem;"></i>
                </div>
                <div class="custom-controls">
                    <div class="progress-bar-container" id="progressContainer">
                        <div class="progress-bar-fill" id="progressFill"></div>
                    </div>
                    <div class="controls-row">
                        <div class="controls-left">
                            <button class="control-btn" id="playPauseBtn" onclick="togglePlay()"><i class="fa-solid fa-play"></i></button>
                            <div class="volume-container">
                                <button class="control-btn" id="volumeBtn" onclick="toggleMute()"><i class="fa-solid fa-volume-high"></i></button>
                                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="1">
                            </div>
                            <span class="time-display" id="timeDisplay">0:00 / 0:00</span>
                        </div>
                        <div class="controls-right">
                            <button class="control-btn" id="speedBtn" onclick="cycleSpeed()"><span>1.0x</span></button>
                            <button class="control-btn" onclick="toggleFullscreen()"><i class="fa-solid fa-expand"></i></button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="player-details">
                <h1 class="player-title" id="playerTitle">Video Title</h1>
                <div class="player-meta">
                    <span><i class="fa-regular fa-clock"></i> Recently added</span>
                    <button class="action-icon-btn" id="playerFavBtn">
                        <i class="fa-regular fa-heart"></i> Add to Favorites
                    </button>
                </div>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
